name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:       # Allows manual triggering

jobs:
  stale:
    name: Mark and Close Stale Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Run Stale Action
        uses: actions/stale@v10.2.0
        with:
          # --- Timing ---
          days-before-stale: 3        # Days of inactivity before marking stale
          days-before-close: 7         # Days after stale label before closing
          days-before-pr-stale: 45     # Override stale timing for PRs
          days-before-pr-close: 10     # Override close timing for PRs

          # --- Labels ---
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,in-progress'
          exempt-pr-labels: 'pinned,security,in-progress'

          # --- Messages ---
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for **3 days**. It will be closed in **7 days** if no further
            activity occurs.

            If this issue is still relevant, please:
            - Leave a comment with an update
            - Remove the `stale` label

            Thank you for your contributions! 🙏

          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If you believe this is still a valid issue, please reopen it with
            additional context or open a new issue.

          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity for **45 days**. It will be closed in **10 days**
            if no further activity occurs.

            If this PR is still in progress, please leave a comment or push a new commit.

          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it if you'd like to continue working on it.

          # --- Limits ---
          operations-per-run: 100      # API call limit per run (avoids rate limiting)
          remove-stale-when-updated: true  # Unmark stale if issue gets activity
          close-issue-reason: not_planned  # GitHub close reason: completed | not_planned
